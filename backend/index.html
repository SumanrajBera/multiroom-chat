<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-room Chat Application</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }

        h1,
        h2 {
            text-align: center;
            margin-block: .5rem;
        }

        input {
            padding: .5rem;
        }

        .settings {
            display: flex;

            align-items: center;
            flex-direction: column;
            gap: .5rem;
        }

        .settings button,
        #chat {
            padding: .5rem;
        }

        .grp {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: .5rem;
        }

        .roomGrp {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: .5rem;
        }

        .chatWrapper {
            width: 400px;
            height: 200px;
            position: relative;
            border: 1px solid;
            margin-inline: auto;
            border-radius: .5rem;
            padding: .5rem .2rem;
        }

        .chatRoom {
            width: 100%;
            height: 100%;
            overflow-y: auto;
        }

        .chatGrp {
            display: flex;
            justify-content: center;
            margin-top: .5rem;
        }

        #exit {
            position: absolute;
            top: .5rem;
            right: 1rem;
        }

        .notify {
            text-align: center;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="roomSettings">
        <h1>Multi-room Chat Application</h1>
        <div class="settings">
            <!-- Setting Username -->
            <div class="usernameGrp">
                <input type="roomName" id="username" placeholder="Enter username">
                <button id="setUsername">Set Username</button>
            </div>
            <div class="grp">
                <h2>Room Settings:</h2>
                <div class="roomGrp">
                    <!-- Setting Room name -->
                    <div class="createRoom">
                        <input type="roomName" id="createText" placeholder="Enter room name">
                        <button id="create">Create Room</button>
                    </div>
                    <!-- Joining a room -->
                    <div class="joinRoom">
                        <input type="roomName" id="joinText" placeholder="Enter room name">
                        <button id="join">Join Room</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <h2>Chat Room</h2>
    <div class="chatWrapper">
        <div class="chatRoom">
            <p></p>
        </div>
        <button id="exit" disabled>Exit Group</button>
    </div>
    <div class="chatGrp">
        <input type="text" id="chatText" placeholder="Enter your message">
        <button id="chat">Send</button>
    </div>

    <script>
        // All the interactions
        const join = document.querySelector("#join")
        const create = document.querySelector("#create")
        const chat = document.querySelector("#chat")
        const setUsername = document.querySelector("#setUsername")
        const exitBtn = document.querySelector("#exit")

        // Input fields
        const createRoom = document.querySelector("#createText")
        const joinRoom = document.querySelector("#joinText")
        const chatText = document.querySelector("#chatText")
        const username = document.querySelector("#username")

        const chatRoom = document.querySelector(".chatRoom")

        const ws = new WebSocket("ws://localhost:3000")

        create.addEventListener("click", () => {
            if (createRoom.value === "") return
            ws.send(JSON.stringify({
                type: "create",
                room: createRoom.value
            }))
        })

        join.addEventListener("click", () => {
            if (joinRoom.value === "") return
            ws.send(JSON.stringify({
                type: "join",
                room: joinRoom.value
            }))
        })

        chat.addEventListener("click", () => {
            ws.send(JSON.stringify({
                type: "chat",
                message: chatText.value
            }))
            console.log(chatText.value)
        })

        setUsername.addEventListener("click", () => {
            if (username.value === "") return
            ws.send(JSON.stringify({
                type: "setUsername",
                username: username.value
            }))
        })

        exitBtn.addEventListener("click", () => {
            ws.close()
        })

        function notify(type, data) {
            let p = document.createElement('p')

            if (type === "error") {
                p.style.color = "red"
            } else p.style.color = "green"

            p.classList.add("notify")

            p.textContent = data;

            chatRoom.appendChild(p)
        }

        function chatting(username, data) {
            let p = document.createElement('p')
            p.innerHTML = `<strong>${username}</strong>: ${data}`;
            chatRoom.appendChild(p)
        }

        ws.onmessage = (data) => {
            data = JSON.parse(data.data)
            let status = data.status
            if (data.type === "createRoom") {
                notify(status, data.message)
                if (status === "success") exitBtn.removeAttribute("disabled")
                else exitBtn.setAttribute("disabled")
            } else if (data.type === "joinRoom") {
                notify(status, data.message)
                if (status === "success") exitBtn.removeAttribute("disabled")
                else exitBtn.setAttribute("disabled")
            } else if (data.type === "setUsername") {
                notify(status, data.message)
            } else if (data.type === "chat") {
                if (data.status !== "success") {
                    notify(status, data.message)
                    return
                }
                chatting(data.username, data.message)
            } else if (data.type === "terminate") {
                notify("error", data.message)
                exitBtn.setAttribute("disabled")
            }
        }

    </script>
</body>

</html>
